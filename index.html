<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booking System Debug</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .container {
      background: white;
      width: 380px;
      padding: 25px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }
    h1 {
      text-align: center;
    }
    input, select, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 16px;
    }
    button {
      background: #28a745;
      color: white;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover {
      background: #218838;
    }
    #status {
      margin-top: 12px;
      text-align: center;
      font-weight: bold;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Book Service</h1>
  <form id="bookingForm">
    <input id="name" placeholder="Name" required>
    <input id="address" placeholder="Address" required>
    <input id="cans" type="number" min="1" placeholder="Number of Cans" required>
    <select id="date" required>
      <option value="">Select Date</option>
    </select>
    <select id="time" required>
      <option value="">Select Time</option>
    </select>
    <button type="submit">Book Now</button>
  </form>
  <div id="status">Ready...</div>
</div>

<script>
  /* 🔴 EDIT ONLY THESE */
  const AIRTABLE_TOKEN = "PASTE_YOUR_API_TOKEN_HERE";
  const BASE_ID = "appiSgF39h6jIasNa";
  const TABLE_NAME = "Bookings";
  const FORMSPREE_URL = "https://formspree.io/f/xpqbkvlr";

  /* UI Elements */
  const form = document.getElementById("bookingForm");
  const status = document.getElementById("status");
  const dateSelect = document.getElementById("date");
  const timeSelect = document.getElementById("time");

  /* -----------------------
     LOAD WED + THU DATES
  ------------------------*/
  function loadDates() {
    const today = new Date();
    const year = today.getFullYear();
    const month = today.getMonth();
    dateSelect.innerHTML = `<option value="">Select Date</option>`;
    for (let d = 1; d <= 31; d++) {
      let date = new Date(year, month, d);
      if (date.getMonth() !== month) break;
      if (date.getDay() === 3 || date.getDay() === 4) {
        let dayName = date.getDay() === 3 ? "Wednesday" : "Thursday";
        let opt = document.createElement("option");
        opt.value = `${dayName} - ${date.getMonth()+1}/${date.getDate()}/${date.getFullYear()}`;
        opt.textContent = opt.value;
        dateSelect.appendChild(opt);
      }
    }
  }
  loadDates();

  /* -----------------------
     TIME OPTIONS
  ------------------------*/
  dateSelect.addEventListener("change", () => {
    timeSelect.innerHTML = `<option value="">Select Time</option>`;
    if (dateSelect.value.includes("Thursday")) {
      ["10:00 AM","11:00 AM","12:00 PM"].forEach(t => {
        let o = document.createElement("option");
        o.value = t;
        o.textContent = t;
        timeSelect.appendChild(o);
      });
    } else {
      ["12:00 PM","1:00 PM","2:00 PM","2:30 PM","3:00 PM","4:00 PM"].forEach(t => {
        let o = document.createElement("option");
        o.value = t;
        o.textContent = t;
        timeSelect.appendChild(o);
      });
    }
  });

  /* -----------------------
     SUBMIT (DEBUG RESPONSE)
  ------------------------*/
  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const slotKey = dateSelect.value + "|" + timeSelect.value;

    const bookingData = {
      Name: document.getElementById("name").value,
      Address: document.getElementById("address").value,
      Cans: Number(document.getElementById("cans").value),
      Date: dateSelect.value,
      Time: timeSelect.value,
      SlotKey: slotKey
    };

    console.log("DATA SENT:", bookingData);

    try {
      const url = `https://api.airtable.com/v0/${BASE_ID}/${TABLE_NAME}`;

      const res = await fetch(url, {
        method: "POST",
        headers: {
          "Authorization": `Bearer ${AIRTABLE_TOKEN}`,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ fields: bookingData })
      });

      const text = await res.text();
      console.log("STATUS:", res.status);
      console.log("RESPONSE:", text);

      // Show the full response in the status
      status.innerText = 
        "STATUS: " + res.status + "\n\n" + 
        "RESPONSE:\n" + text;

      if (!res.ok) {
        status.style.color = "red";
        return;
      }

      // If successful, also send to Formspree (optional backup)
      await fetch(FORMSPREE_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(bookingData)
      });

      status.style.color = "green";
      status.innerText += "\n\n✅ Booking Confirmed! Check Airtable.";
      form.reset();
      timeSelect.innerHTML = `<option value="">Select Time</option>`;
    } catch (err) {
      console.log(err);
      status.style.color = "red";
      status.innerText = "❌ Network Error:\n" + err.message;
    }
  });
</script>

</body>
</html>
