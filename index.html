<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booking Debug</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:360px;
    background:white;
    padding:20px;
    border-radius:12px;
}

input, select, button{
    width:100%;
    padding:10px;
    margin-top:10px;
}

#status{
    margin-top:10px;
    font-weight:bold;
    white-space:pre-wrap;
}
</style>
</head>

<body>

<div class="container">

<h2>Airtable Debug Test</h2>

<input id="name" placeholder="Name">
<input id="address" placeholder="Address">

<select id="cans">
    <option value="">Cans</option>
    <option value="1">1</option>
    <option value="2">2</option>
</select>

<select id="date"></select>
<select id="time"></select>

<button id="bookBtn">Test Booking</button>

<div id="status">Ready...</div>

</div>

<script>

/* 🔴 YOUR SETTINGS */
const AIRTABLE_TOKEN = "PASTE_YOUR_API_TOKEN_HERE";
const BASE_ID = "appiSgF39h6jIasNa";
const TABLE_NAME = "Bookings";

/* UI */
const status = document.getElementById("status");
const dateSelect = document.getElementById("date");
const timeSelect = document.getElementById("time");

/* ---------------------------
   LOAD DATES
----------------------------*/
function loadDates(){

    const today = new Date();
    const year = today.getFullYear();
    const month = today.getMonth();

    dateSelect.innerHTML = "";

    for(let d=1; d<=31; d++){

        let date = new Date(year, month, d);

        if(date.getMonth() !== month) break;

        if(date.getDay() === 3 || date.getDay() === 4){

            let opt = document.createElement("option");
            opt.value = `Day ${date.getDate()}`;
            opt.textContent = `Day ${date.getDate()}`;

            dateSelect.appendChild(opt);
        }
    }
}

loadDates();

/* ---------------------------
   LOAD TIMES
----------------------------*/
dateSelect.addEventListener("change", () => {

    timeSelect.innerHTML = "";

    ["10AM","11AM","12PM"].forEach(t=>{
        let o=document.createElement("option");
        o.value=t;
        o.textContent=t;
        timeSelect.appendChild(o);
    });

});

/* ---------------------------
   TEST AIRTABLE
----------------------------*/
document.getElementById("bookBtn").addEventListener("click", async () => {

    status.innerText = "Sending to Airtable...";

    const data = {
        fields: {
            Name: document.getElementById("name").value,
            Address: document.getElementById("address").value,
            Cans: Number(document.getElementById("cans").value),
            Date: dateSelect.value,
            Time: timeSelect.value,
            SlotKey: dateSelect.value + "|" + timeSelect.value
        }
    };

    try {

        const url = `https://api.airtable.com/v0/${BASE_ID}/${TABLE_NAME}`;

        console.log("URL:", url);
        console.log("DATA:", data);

        const res = await fetch(url, {
            method:"POST",
            headers:{
                "Authorization": `Bearer ${AIRTABLE_TOKEN}`,
                "Content-Type":"application/json"
            },
            body: JSON.stringify(data)
        });

        const text = await res.text();

        console.log("STATUS:", res.status);
        console.log("RESPONSE:", text);

        if(!res.ok){
            status.innerText = "❌ ERROR:\n" + text;
            return;
        }

        status.innerText = "✅ SUCCESS! Check Airtable";

    } catch (err) {

        console.log(err);
        status.innerText = "❌ FETCH FAILED:\n" + err.message;

    }

});

</script>

</body>
</html>
