<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booking System</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:white;
    width:360px;
    padding:25px;
    border-radius:18px;
}

input, select, button{
    width:100%;
    padding:12px;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>Booking System</h1>

<form id="bookingForm">

<input id="name" placeholder="Name" required>
<input id="address" placeholder="Address" required>

<select id="cans" required>
    <option value="">Cans</option>
    <option>1 Can</option>
    <option>2 Cans</option>
</select>

<select id="date" required>
    <option value="">Select Date</option>
</select>

<select id="time" required>
    <option value="">Select Time</option>
</select>

<button type="submit">Book</button>

</form>

<div id="status"></div>

</div>

<script>

/* =========================
   🔴 PASTE YOUR INFO HERE
   ========================= */

// 🔑 Airtable API token
const AIRTABLE_TOKEN = patC9MjLvk4JCDQ5Q.0c365a1d7382c9f7dea8d4750ed19c18b00484109709ff5cbf8ad31d8c5bb9db;

// 🧾 Airtable Base ID
const BASE_ID = "appiSgF39h6jIasNa";

// 📊 Table name in Airtable
const TABLE_NAME = "Bookings";

// 📧 Formspree link
const FORMSPREE_URL = "https://formspree.io/f/xpqbkvlr";

/* ========================= */

document.addEventListener("DOMContentLoaded", () => {

    const dateSelect = document.getElementById("date");
    const timeSelect = document.getElementById("time");
    const form = document.getElementById("bookingForm");
    const status = document.getElementById("status");

    // ------------------------
    // LOAD DATES
    // ------------------------
    const today = new Date();
    const year = today.getFullYear();
    const month = today.getMonth();

    for (let d = 1; d <= 31; d++) {

        let date = new Date(year, month, d);
        if (date.getMonth() !== month) break;

        if (date.getDay() === 3 || date.getDay() === 4) {

            let dayName = date.getDay() === 3 ? "Wednesday" : "Thursday";

            let opt = document.createElement("option");
            opt.value = `${dayName} - ${date.getMonth()+1}/${date.getDate()}`;
            opt.textContent = opt.value;

            dateSelect.appendChild(opt);
        }
    }

    // ------------------------
    // TIMES SWITCH
    // ------------------------
    dateSelect.addEventListener("change", () => {

        timeSelect.innerHTML = `<option value="">Select Time</option>`;

        if (dateSelect.value.includes("Thursday")) {

            ["10:00 AM","11:00 AM","12:00 PM"].forEach(t => {
                let o = document.createElement("option");
                o.value = t;
                o.textContent = t;
                timeSelect.appendChild(o);
            });

        } else {

            ["12:00 PM","1:00 PM","2:00 PM","3:00 PM","4:00 PM"].forEach(t => {
                let o = document.createElement("option");
                o.value = t;
                o.textContent = t;
                timeSelect.appendChild(o);
            });

        }
    });

    // ------------------------
    // SUBMIT (AIRTABLE + FORMSPREE)
    // ------------------------
    form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const data = {
            Name: name.value,
            Address: address.value,
            Cans: cans.value,
            Date: date.value,
            Time: time.value,
            SlotKey: date.value + "|" + time.value
        };

        try {

            // Airtable
            await fetch(`https://api.airtable.com/v0/${BASE_ID}/${TABLE_NAME}`, {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${AIRTABLE_TOKEN}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ fields: data })
            });

            // Formspree
            await fetch(FORMSPREE_URL, {
                method: "POST",
                headers: {
                    "Accept": "application/json",
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(data)
            });

            status.style.color = "green";
            status.innerHTML = "Booking Confirmed!";
            form.reset();
            timeSelect.innerHTML = `<option value="">Select Time</option>`;

        } catch (err) {
            status.style.color = "red";
            status.innerHTML = "Error sending booking.";
        }
    });

});
</script>

</body>
</html>
