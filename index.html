<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booking System</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:white;
    width:360px;
    padding:25px;
    border-radius:18px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h1{text-align:center;}

input, select, button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:10px;
    border:1px solid #ccc;
    font-size:16px;
}

button{
    background:#28a745;
    color:white;
    border:none;
    font-weight:bold;
    cursor:pointer;
}

button:hover{background:#218838;}

#status{
    margin-top:15px;
    text-align:center;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h1>Booking System</h1>

<form id="bookingForm">

<input id="name" placeholder="Name" required>
<input id="address" placeholder="Address" required>

<!-- CANS AS NUMBER -->
<input id="cans" type="number" min="1" max="10" placeholder="Number of Cans" required>

<select id="date" required>
    <option value="">Select Date</option>
</select>

<select id="time" required>
    <option value="">Select Time</option>
</select>

<button type="submit">Book Now</button>

</form>

<div id="status"></div>

</div>

<script>

/* =========================
   🔴 EDIT THESE ONLY
   ========================= */

const AIRTABLE_TOKEN = "PASTE_YOUR_API_TOKEN_HERE";
const BASE_ID = "appiSgF39h6jIasNa";
const TABLE_NAME = "Bookings";
const FORMSPREE_URL = "https://formspree.io/f/xpqbkvlr";

/* ========================= */

document.addEventListener("DOMContentLoaded", () => {

    const dateSelect = document.getElementById("date");
    const timeSelect = document.getElementById("time");
    const form = document.getElementById("bookingForm");
    const status = document.getElementById("status");

    // -----------------------
    // LOAD WED + THU DATES
    // -----------------------
    const today = new Date();
    const year = today.getFullYear();
    const month = today.getMonth();

    dateSelect.innerHTML = `<option value="">Select Date</option>`;

    for (let d = 1; d <= 31; d++) {

        let date = new Date(year, month, d);

        if (date.getMonth() !== month) break;

        if (date.getDay() === 3 || date.getDay() === 4) {

            let dayName = date.getDay() === 3 ? "Wednesday" : "Thursday";

            let opt = document.createElement("option");
            opt.value = `${dayName} - ${date.getMonth()+1}/${date.getDate()}/${date.getFullYear()}`;
            opt.textContent = opt.value;

            dateSelect.appendChild(opt);
        }
    }

    // -----------------------
    // TIME SWITCHER
    // -----------------------
    dateSelect.addEventListener("change", () => {

        timeSelect.innerHTML = `<option value="">Select Time</option>`;

        if (!dateSelect.value) return;

        let times = dateSelect.value.includes("Thursday")
            ? ["10:00 AM","11:00 AM","12:00 PM"]
            : ["12:00 PM","1:00 PM","2:00 PM","2:30 PM","3:00 PM","4:00 PM"];

        times.forEach(t => {
            let opt = document.createElement("option");
            opt.value = t;
            opt.textContent = t;
            timeSelect.appendChild(opt);
        });
    });

    // -----------------------
    // SUBMIT (SAFE FIXED)
    // -----------------------
    form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const bookingData = {
            Name: name.value,
            Address: address.value,
            Cans: Number(cans.value), // IMPORTANT FIX
            Date: date.value,
            Time: time.value,
            SlotKey: date.value + "|" + time.value
        };

        try {

            // Airtable
            await fetch(`https://api.airtable.com/v0/${BASE_ID}/${TABLE_NAME}`, {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${AIRTABLE_TOKEN}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ fields: bookingData })
            });

            // Formspree
            await fetch(FORMSPREE_URL, {
                method: "POST",
                headers: {
                    "Accept": "application/json",
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(bookingData)
            });

            status.style.color = "green";
            status.innerHTML = "Booking Confirmed!";
            form.reset();
            timeSelect.innerHTML = `<option value="">Select Time</option>`;

        } catch (err) {

            console.log(err);

            status.style.color = "red";
            status.innerHTML = "Booking failed. Check Airtable setup.";

        }
    });

});
</script>

</body>
</html>
