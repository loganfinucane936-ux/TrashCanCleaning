<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trash Can Booking System</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:white;
    width:380px;
    padding:25px;
    border-radius:16px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
}

input, select, button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:10px;
    border:1px solid #ccc;
    font-size:16px;
    box-sizing:border-box;
}

button{
    background:#28a745;
    color:white;
    border:none;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#218838;
}

#status{
    margin-top:12px;
    text-align:center;
    font-weight:bold;
    white-space:pre-wrap;
}

</style>
</head>

<body>

<div class="container">

<h1>Book Service</h1>

<form id="bookingForm">

<input id="name" placeholder="Name" required>

<input id="address" placeholder="Address" required>

<input
    id="cans"
    type="number"
    min="1"
    placeholder="Number of Cans"
    required
>

<select id="date" required>
    <option value="">Select Date</option>
</select>

<select id="time" required>
    <option value="">Select Time</option>
</select>

<button type="submit">Book Now</button>

</form>

<div id="status"></div>

</div>

<script>

/* =====================================
   CONFIG
===================================== */

// PUT YOUR NEW AIRTABLE TOKEN HERE
const AIRTABLE_TOKEN = "PASTE_NEW_TOKEN_HERE";

const BASE_ID = "appiSgF39h6jIasNa";
const TABLE_NAME = "Bookings";

const FORMSPREE_URL = "https://formspree.io/f/xpqbkvlr";

/* =====================================
   ELEMENTS
===================================== */

const form = document.getElementById("bookingForm");
const status = document.getElementById("status");

const nameInput = document.getElementById("name");
const addressInput = document.getElementById("address");
const cansInput = document.getElementById("cans");

const dateSelect = document.getElementById("date");
const timeSelect = document.getElementById("time");

/* =====================================
   LOAD DATES
   WEDNESDAY + THURSDAY ONLY
===================================== */

function loadDates(){

    const today = new Date();

    dateSelect.innerHTML =
        `<option value="">Select Date</option>`;

    for(let i = 0; i < 60; i++){

        let date = new Date();

        date.setDate(today.getDate() + i);

        // Wednesday = 3
        // Thursday = 4
        if(date.getDay() === 3 || date.getDay() === 4){

            let dayName =
                date.getDay() === 3
                ? "Wednesday"
                : "Thursday";

            let formatted =
                `${dayName} - ${date.getMonth()+1}/${date.getDate()}/${date.getFullYear()}`;

            let option = document.createElement("option");

            option.value = formatted;
            option.textContent = formatted;

            dateSelect.appendChild(option);
        }
    }
}

loadDates();

/* =====================================
   LOAD AVAILABLE TIMES
===================================== */

dateSelect.addEventListener("change", async () => {

    timeSelect.innerHTML =
        `<option value="">Loading...</option>`;

    if(!dateSelect.value){
        return;
    }

    let allTimes =
        dateSelect.value.includes("Thursday")
        ? [
            "10:00 AM",
            "11:00 AM",
            "12:00 PM"
          ]
        : [
            "12:00 PM",
            "1:00 PM",
            "2:00 PM",
            "2:30 PM",
            "3:00 PM",
            "4:00 PM"
          ];

    try{

        const response = await fetch(
            `https://api.airtable.com/v0/${BASE_ID}/${TABLE_NAME}`,
            {
                headers:{
                    "Authorization":
                        `Bearer ${AIRTABLE_TOKEN}`
                }
            }
        );

        const data = await response.json();

        console.log("AIRTABLE RESPONSE:", data);

        // CHECK FOR AIRTABLE ERRORS
        if(data.error){

            console.error(data.error);

            timeSelect.innerHTML =
                `<option value="">Airtable Error</option>`;

            status.style.color = "red";

            status.innerHTML =
                "❌ Airtable Error:<br>" +
                JSON.stringify(data.error);

            return;
        }

        // SAFELY READ SLOT KEYS
        const bookedSlots = (data.records || [])
            .map(record => record.fields?.SlotKey)
            .filter(Boolean);

        timeSelect.innerHTML =
            `<option value="">Select Time</option>`;

        allTimes.forEach(time => {

            const slotKey =
                `${dateSelect.value}|${time}`;

            // ONLY SHOW AVAILABLE TIMES
            if(!bookedSlots.includes(slotKey)){

                let option =
                    document.createElement("option");

                option.value = time;
                option.textContent = time;

                timeSelect.appendChild(option);
            }
        });

        // NO TIMES LEFT
        if(timeSelect.options.length === 1){

            let option =
                document.createElement("option");

            option.textContent =
                "No Times Available";

            option.disabled = true;

            timeSelect.appendChild(option);
        }

    } catch(error){

        console.error("TIME LOAD ERROR:", error);

        timeSelect.innerHTML =
            `<option value="">Error Loading Times</option>`;

        status.style.color = "red";

        status.innerHTML =
            "❌ Failed loading available times.";
    }
});

/* =====================================
   SUBMIT BOOKING
===================================== */

form.addEventListener("submit", async (e) => {

    e.preventDefault();

    const name = nameInput.value.trim();
    const address = addressInput.value.trim();
    const cans = Number(cansInput.value);

    const date = dateSelect.value;
    const time = timeSelect.value;

    // VALIDATION
    if(
        !name ||
        !address ||
        !cans ||
        cans <= 0 ||
        !date ||
        !time
    ){

        status.style.color = "red";

        status.innerHTML =
            "❌ Please fill in all fields correctly.";

        return;
    }

    const slotKey = `${date}|${time}`;

    const bookingData = {

        Name: name,
        Address: address,
        Cans: cans,

        Date: date,
        Time: time,

        SlotKey: slotKey
    };

    try{

        /* =========================
           DOUBLE BOOKING CHECK
        ========================== */

        const checkResponse = await fetch(
            `https://api.airtable.com/v0/${BASE_ID}/${TABLE_NAME}?filterByFormula={SlotKey}="${slotKey}"`,
            {
                headers:{
                    "Authorization":
                        `Bearer ${AIRTABLE_TOKEN}`
                }
            }
        );

        const checkData =
            await checkResponse.json();

        if(checkData.records &&
           checkData.records.length > 0){

            status.style.color = "red";

            status.innerHTML =
                "❌ This time slot is already booked.";

            return;
        }

        /* =========================
           SAVE TO AIRTABLE
        ========================== */

        const saveResponse = await fetch(
            `https://api.airtable.com/v0/${BASE_ID}/${TABLE_NAME}`,
            {
                method:"POST",

                headers:{
                    "Authorization":
                        `Bearer ${AIRTABLE_TOKEN}`,

                    "Content-Type":
                        "application/json"
                },

                body: JSON.stringify({
                    fields: bookingData
                })
            }
        );

        const saveData =
            await saveResponse.json();

        console.log("SAVE RESPONSE:", saveData);

        // HANDLE AIRTABLE ERRORS
        if(!saveResponse.ok){

            status.style.color = "red";

            status.innerHTML =
                "❌ Airtable Error:<br>" +
                JSON.stringify(saveData);

            return;
        }

        /* =========================
           SEND TO FORMSPREE
        ========================== */

        try{

            await fetch(FORMSPREE_URL,{

                method:"POST",

                headers:{
                    "Content-Type":
                        "application/json"
                },

                body: JSON.stringify(bookingData)
            });

        } catch(formError){

            console.log(
                "FORMSPREE ERROR:",
                formError
            );
        }

        /* =========================
           SUCCESS
        ========================== */

        status.style.color = "green";

        status.innerHTML =
            "✅ Booking Confirmed!";

        form.reset();

        timeSelect.innerHTML =
            `<option value="">Select Time</option>`;

    } catch(error){

        console.error("SUBMIT ERROR:", error);

        status.style.color = "red";

        status.innerHTML =
            "❌ Network Error";
    }
});

</script>

</body>
</html>
