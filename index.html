<!DOCTYPE html>
<html>
<head>
  <title>Trash Can Cleaning Service</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f4f4;
    }

    header {
      background: #2e7d32;
      color: white;
      padding: 20px;
      text-align: center;
    }

    section {
      padding: 20px;
      max-width: 800px;
      margin: auto;
      background: white;
      margin-top: 20px;
      border-radius: 10px;
    }

    h2 {
      color: #2e7d32;
    }

    input, textarea {
      width: 95%;
      padding: 8px;
      margin: 5px 0;
    }

    .button {
      display: inline-block;
      padding: 10px 15px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 10px;
    }

    .button:hover {
      background: #45a049;
    }

    #popup {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
    }

    .popup-content {
      background: white;
      width: 320px;
      margin: 120px auto;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
    }

    textarea#output {
      height: 140px;
    }
  </style>
</head>

<body>

<header>
  <h1>🗑️ Trash Can Cleaning Service</h1>
  <p>$15 per can | 2 cans for $25</p>
</header>

<section>
  <h2>Book a Cleaning</h2>

  <input id="name" placeholder="Your Name">
  <input id="address" placeholder="Your Address">
  <input id="cans" placeholder="Number of Cans">
  <input id="date" type="date">
  <textarea id="notes" placeholder="Extra notes (optional)"></textarea>

  <button class="button" onclick="generate()">Book Now</button>
</section>

<!-- POPUP -->
<div id="popup">
  <div class="popup-content">
    <h3>Your Booking Message</h3>

    <textarea id="output" readonly></textarea>

    <br>
    <button class="button" onclick="copyText()">Copy</button>
    <button class="button" onclick="closePopup()">Close</button>

    <p style="font-size:12px;">
      Paste this into an email to: <br>
      <b>loganfinucane936@gmail.com</b>
    </p>
  </div>
</div>

<script>
  function generate() {
    let name = document.getElementById("name").value;
    let address = document.getElementById("address").value;
    let cans = document.getElementById("cans").value;
    let date = document.getElementById("date").value;
    let notes = document.getElementById("notes").value;

    let message =
`New Trash Can Cleaning Booking

Name: ${name}
Address: ${address}
Number of Cans: ${cans}
Preferred Date: ${date}
Notes: ${notes}`;

    document.getElementById("output").value = message;
    document.getElementById("popup").style.display = "block";
  }

  function copyText() {
    let text = document.getElementById("output");
    text.select();
    text.setSelectionRange(0, 99999);
    document.execCommand("copy");
    alert("Copied to clipboard!");
  }

  function closePopup() {
    document.getElementById("popup").style.display = "none";
  }
</script>

</body>
</html>
