<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booking Debug System</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:360px;
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

input, select, button{
    width:100%;
    padding:10px;
    margin-top:10px;
}

#status{
    margin-top:10px;
    font-weight:bold;
    white-space:pre-wrap;
}
</style>
</head>

<body>

<div class="container">

<h2>Booking Debug</h2>

<input id="name" placeholder="Name">
<input id="address" placeholder="Address">

<select id="cans">
    <option value="">Cans</option>
    <option value="1">1</option>
    <option value="2">2</option>
</select>

<select id="date"></select>
<select id="time"></select>

<button id="bookBtn">Submit Booking</button>

<div id="status">Ready...</div>

</div>

<script>

/* 🔴 YOUR SETTINGS */
const AIRTABLE_TOKEN = "patC9MjLvk4JCDQ5Q.0c365a1d7382c9f7dea8d4750ed19c18b00484109709ff5cbf8ad31d8c5bb9db";
const BASE_ID = "appiSgF39h6jIasNa";
const TABLE_NAME = "Bookings";

/* UI */
const status = document.getElementById("status");
const dateSelect = document.getElementById("date");
const timeSelect = document.getElementById("time");

/* ---------------------------
   LOAD DATES (WED + THU)
----------------------------*/
function loadDates(){

    const today = new Date();
    const year = today.getFullYear();
    const month = today.getMonth();

    dateSelect.innerHTML = "";

    for(let d=1; d<=31; d++){

        let date = new Date(year, month, d);

        if(date.getMonth() !== month) break;

        if(date.getDay() === 3 || date.getDay() === 4){

            let opt = document.createElement("option");
            opt.value = `Day ${date.getDate()}`;
            opt.textContent = `Day ${date.getDate()}`;
            dateSelect.appendChild(opt);
        }
    }
}

loadDates();

/* ---------------------------
   LOAD TIMES
----------------------------*/
dateSelect.addEventListener("change", () => {

    timeSelect.innerHTML = "";

    ["10AM","11AM","12PM"].forEach(t=>{
        let o=document.createElement("option");
        o.value=t;
        o.textContent=t;
        timeSelect.appendChild(o);
    });

});

/* ---------------------------
   SUBMIT + FULL DEBUG
----------------------------*/
document.getElementById("bookBtn").addEventListener("click", async () => {

    status.innerText = "Sending request...";

    const slotKey = dateSelect.value + "|" + timeSelect.value;

    const bookingData = {
        Name: document.getElementById("name").value,
        Address: document.getElementById("address").value,
        Cans: Number(document.getElementById("cans").value),
        Date: dateSelect.value,
        Time: timeSelect.value,
        SlotKey: slotKey
    };

    console.log("DATA SENT:", bookingData);

    try {

        const url = `https://api.airtable.com/v0/${BASE_ID}/${TABLE_NAME}`;

        const res = await fetch(url, {
            method: "POST",
            headers: {
                "Authorization": `Bearer ${AIRTABLE_TOKEN}`,
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ fields: bookingData })
        });

        const text = await res.text();

        console.log("STATUS:", res.status);
        console.log("RESPONSE:", text);

        // SHOW FULL RESPONSE ON SCREEN
        status.innerText =
            "STATUS: " + res.status + "\n\n" +
            "RESPONSE:\n" + text;

        if (!res.ok) {
            status.style.color = "red";
            return;
        }

        status.style.color = "green";
        status.innerText += "\n\n✅ SUCCESS (Check Airtable)";

    } catch (err) {

        console.log(err);

        status.style.color = "red";
        status.innerText =
            "NETWORK ERROR:\n" + err.message;

    }

});

</script>

</body>
</html>
