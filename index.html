<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trash Can Booking System</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    background:white;
    width:380px;
    padding:25px;
    border-radius:16px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h1,h2{
    text-align:center;
}

input, select, button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:10px;
    border:1px solid #ccc;
    font-size:16px;
    box-sizing:border-box;
}

button{
    background:#28a745;
    color:white;
    border:none;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#218838;
}

.adminBtn{
    background:#007bff;
}

.adminBtn:hover{
    background:#0056b3;
}

.deleteBtn{
    background:red;
    margin-top:5px;
}

.completeBtn{
    background:orange;
    margin-top:5px;
}

#status{
    margin-top:12px;
    text-align:center;
    font-weight:bold;
    white-space:pre-wrap;
}

#adminPanel{
    display:none;
    margin-top:20px;
}

.bookingCard{
    background:#f4f4f4;
    padding:12px;
    border-radius:10px;
    margin-top:12px;
}

small{
    color:gray;
}
</style>
</head>

<body>

<div class="container">

<h1>Book Service</h1>

<form id="bookingForm">

<input id="name" placeholder="Name" required>
<input id="address" placeholder="Address" required>
<input id="cans" type="number" min="1" placeholder="Number of Cans" required>

<select id="date" required>
    <option value="">Select Date</option>
</select>

<select id="time" required>
    <option value="">Select Time</option>
</select>

<button type="submit">Book Now</button>

</form>

<button class="adminBtn" onclick="openAdmin()">Admin Dashboard</button>

<div id="status"></div>

<div id="adminPanel">

<h2>Admin Dashboard</h2>

<div id="bookingsList"></div>

</div>

</div>

<script>

/* =========================
   EDIT THESE ONLY
========================= */

const AIRTABLE_TOKEN = "patC9MjLvk4JCDQ5Q.0c365a1d7382c9f7dea8d4750ed19c18b00484109709ff5cbf8ad31d8c5bb9db";
const BASE_ID = "appiSgF39h6jIasNa";
const TABLE_NAME = "Bookings";
const FORMSPREE_URL = "https://formspree.io/f/xpqbkvlr";

const ADMIN_PASSWORD = "Charles2013";

/* ========================= */

const form = document.getElementById("bookingForm");
const status = document.getElementById("status");

const nameInput = document.getElementById("name");
const addressInput = document.getElementById("address");
const cansInput = document.getElementById("cans");
const dateSelect = document.getElementById("date");
const timeSelect = document.getElementById("time");

const adminPanel = document.getElementById("adminPanel");
const bookingsList = document.getElementById("bookingsList");

/* -----------------------
   LOAD DATES
------------------------*/
function loadDates(){

    const today = new Date();
    const year = today.getFullYear();
    const month = today.getMonth();

    dateSelect.innerHTML = `<option value="">Select Date</option>`;

    for(let d=1; d<=31; d++){

        let date = new Date(year, month, d);

        if(date.getMonth() !== month) break;

        if(date.getDay() === 3 || date.getDay() === 4){

            let dayName = date.getDay() === 3 ? "Wednesday" : "Thursday";

            let formatted =
                `${dayName} - ${date.getMonth()+1}/${date.getDate()}/${date.getFullYear()}`;

            let opt = document.createElement("option");
            opt.value = formatted;
            opt.textContent = formatted;

            dateSelect.appendChild(opt);
        }
    }
}

loadDates();

/* -----------------------
   LOAD TIMES
------------------------*/
dateSelect.addEventListener("change", async () => {

    timeSelect.innerHTML = `<option value="">Loading...</option>`;

    if(!dateSelect.value) return;

    let allTimes =
        dateSelect.value.includes("Thursday")
        ? ["10:00 AM","11:00 AM","12:00 PM"]
        : ["12:00 PM","1:00 PM","2:00 PM","2:30 PM","3:00 PM","4:00 PM"];

    try {

        const res = await fetch(
            `https://api.airtable.com/v0/${BASE_ID}/${TABLE_NAME}`,
            {
                headers:{
                    "Authorization": `Bearer ${AIRTABLE_TOKEN}`
                }
            }
        );

        const data = await res.json();

        const bookedSlots = data.records.map(r => r.fields.SlotKey);

        timeSelect.innerHTML = `<option value="">Select Time</option>`;

        allTimes.forEach(time => {

            const slotKey = dateSelect.value + "|" + time;

            if(!bookedSlots.includes(slotKey)){

                let opt = document.createElement("option");
                opt.value = time;
                opt.textContent = time;

                timeSelect.appendChild(opt);
            }
        });

    } catch(err){
        console.log(err);
        timeSelect.innerHTML = `<option value="">Error Loading Times</option>`;
    }
});

/* -----------------------
   SUBMIT BOOKING
------------------------*/
form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const bookingData = {
        Name: nameInput.value,
        Address: addressInput.value,
        Cans: Number(cansInput.value),
        Date: dateSelect.value,
        Time: timeSelect.value,
        SlotKey: dateSelect.value + "|" + timeSelect.value,
        Status: "Pending"
    };

    try {

        const checkRes = await fetch(
            `https://api.airtable.com/v0/${BASE_ID}/${TABLE_NAME}?filterByFormula={SlotKey}="${bookingData.SlotKey}"`,
            {
                headers:{
                    "Authorization": `Bearer ${AIRTABLE_TOKEN}`
                }
            }
        );

        const checkData = await checkRes.json();

        if(checkData.records.length > 0){
            status.style.color = "red";
            status.innerHTML = "❌ This time slot is already booked.";
            return;
        }

        const res = await fetch(
            `https://api.airtable.com/v0/${BASE_ID}/${TABLE_NAME}`,
            {
                method:"POST",
                headers:{
                    "Authorization": `Bearer ${AIRTABLE_TOKEN}`,
                    "Content-Type":"application/json"
                },
                body: JSON.stringify({ fields: bookingData })
            }
        );

        if(!res.ok){
            status.style.color = "red";
            status.innerHTML = "❌ Booking failed";
            return;
        }

        await fetch(FORMSPREE_URL,{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body: JSON.stringify(bookingData)
        });

        status.style.color = "green";
        status.innerHTML = "✅ Booking Confirmed!";

        form.reset();
        timeSelect.innerHTML = `<option value="">Select Time</option>`;

    } catch(err){
        console.log(err);
        status.style.color = "red";
        status.innerHTML = "❌ Network Error";
    }
});

/* -----------------------
   ADMIN LOGIN
------------------------*/
function openAdmin(){

    const password = prompt("Enter Admin Password");

    if(password !== ADMIN_PASSWORD){
        alert("Wrong Password");
        return;
    }

    adminPanel.style.display = "block";

    loadBookings();
}

/* -----------------------
   LOAD BOOKINGS
------------------------*/
async function loadBookings(){

    bookingsList.innerHTML = "Loading bookings...";

    try{

        const res = await fetch(
            `https://api.airtable.com/v0/${BASE_ID}/${TABLE_NAME}?sort[0][field]=createdTime&sort[0][direction]=desc`,
            {
                headers:{
                    "Authorization": `Bearer ${AIRTABLE_TOKEN}`
                }
            }
        );

        const data = await res.json();

        bookingsList.innerHTML = "";

        if(data.records.length === 0){
            bookingsList.innerHTML = "No bookings found.";
            return;
        }

        data.records.forEach(record => {

            const fields = record.fields;

            const div = document.createElement("div");
            div.className = "bookingCard";

            div.innerHTML = `
                <strong>${fields.Name || ""}</strong><br>
                ${fields.Address || ""}<br>
                Cans: ${fields.Cans || ""}<br>
                ${fields.Date || ""}<br>
                ${fields.Time || ""}<br>
                <small>Status: ${fields.Status || "Pending"}</small>

                <button class="completeBtn"
                    onclick="markComplete('${record.id}')">
                    Mark Completed
                </button>

                <button class="deleteBtn"
                    onclick="deleteBooking('${record.id}')">
                    Delete
                </button>
            `;

            bookingsList.appendChild(div);
        });

    } catch(err){
        console.log(err);
        bookingsList.innerHTML = "Error loading bookings.";
    }
}

/* -----------------------
   DELETE BOOKING
------------------------*/
async function deleteBooking(recordId){

    if(!confirm("Delete this booking?")) return;

    try{

        await fetch(
            `https://api.airtable.com/v0/${BASE_ID}/${TABLE_NAME}/${recordId}`,
            {
                method:"DELETE",
                headers:{
                    "Authorization": `Bearer ${AIRTABLE_TOKEN}`
                }
            }
        );

        loadBookings();

    } catch(err){
        console.log(err);
    }
}

/* -----------------------
   MARK COMPLETE
------------------------*/
async function markComplete(recordId){

    try{

        await fetch(
            `https://api.airtable.com/v0/${BASE_ID}/${TABLE_NAME}/${recordId}`,
            {
                method:"PATCH",
                headers:{
                    "Authorization": `Bearer ${AIRTABLE_TOKEN}`,
                    "Content-Type":"application/json"
                },
                body: JSON.stringify({
                    fields:{
                        Status:"Completed"
                    }
                })
            }
        );

        loadBookings();

    } catch(err){
        console.log(err);
    }
}

</script>

</body>
</html>
