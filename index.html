<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booking System</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:white;
    width:350px;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    margin-bottom:20px;
}

input, select{
    width:100%;
    padding:14px;
    margin-top:12px;
    border-radius:10px;
    border:1px solid #ccc;
    font-size:16px;
}

button{
    width:100%;
    padding:14px;
    margin-top:18px;
    border:none;
    border-radius:10px;
    background:#28a745;
    color:white;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#218838;
}

#status{
    margin-top:18px;
    text-align:center;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="container">

    <h1>Booking System</h1>

    <form id="bookingForm">

        <input type="text" id="name" name="name" placeholder="Enter your name" required>

        <input type="text" id="address" name="address" placeholder="Enter your address" required>

        <select id="cans" name="cans" required>
            <option value="">Number of Cans</option>
            <option value="1 Can">1 Can</option>
            <option value="2 Cans">2 Cans</option>
            <option value="3 Cans">3 Cans</option>
            <option value="4 Cans">4 Cans</option>
            <option value="5 Cans">5 Cans</option>
        </select>

        <select id="date" name="date" required>
            <option value="">Select Date</option>
        </select>

        <select id="time" name="time" required>
            <option value="">Select Time</option>
        </select>

        <button type="submit">Book Now</button>

    </form>

    <div id="status"></div>

</div>

<script>
const dateSelect = document.getElementById("date");
const timeSelect = document.getElementById("time");
const bookingForm = document.getElementById("bookingForm");
const status = document.getElementById("status");

// Generate Wednesdays + Thursdays
const today = new Date();
const year = today.getFullYear();
const month = today.getMonth();

let availableDates = [];

for(let day = 1; day <= 31; day++){
    const date = new Date(year, month, day);

    if(date.getMonth() !== month) break;

    // Wednesday = 3, Thursday = 4
    if(date.getDay() === 3 || date.getDay() === 4){

        let weekday = date.getDay() === 3 ? "Wednesday" : "Thursday";

        const formatted =
            weekday + " - " +
            (date.getMonth()+1) + "/" +
            date.getDate() + "/" +
            date.getFullYear();

        availableDates.push({
            label: formatted,
            day: date.getDay()
        });
    }
}

// Fill date dropdown
availableDates.forEach(d => {
    const option = document.createElement("option");
    option.value = JSON.stringify(d);
    option.textContent = d.label;
    dateSelect.appendChild(option);
});

// Time sets
const wednesdayTimes = [
    "12:00 PM",
    "1:00 PM",
    "2:00 PM",
    "2:30 PM",
    "3:00 PM",
    "4:00 PM"
];

const thursdayTimes = [
    "10:00 AM",
    "11:00 AM",
    "12:00 PM"
];

// Update times when date changes
dateSelect.addEventListener("change", () => {

    timeSelect.innerHTML = `<option value="">Select Time</option>`;

    if(!dateSelect.value) return;

    const selected = JSON.parse(dateSelect.value);

    let times = selected.day === 3 ? wednesdayTimes : thursdayTimes;

    times.forEach(t => {
        const option = document.createElement("option");
        option.value = t;
        option.textContent = t;
        timeSelect.appendChild(option);
    });
});

// Submit to Formspree
bookingForm.addEventListener("submit", async function(e){

    e.preventDefault();

    const formData = new FormData(bookingForm);

    const response = await fetch("https://formspree.io/f/xpqbkvlr", {
        method: "POST",
        body: formData,
        headers: {
            "Accept": "application/json"
        }
    });

    if(response.ok){

        status.style.color = "green";
        status.innerHTML = "Booking Confirmed!";
        bookingForm.reset();
        timeSelect.innerHTML = `<option value="">Select Time</option>`;

    } else {

        status.style.color = "red";
        status.innerHTML = "Something went wrong.";

    }
});
</script>

</body>
</html>
