<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trash Can Booking System</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    box-sizing:border-box;
}

.container{
    background:white;
    width:380px;
    padding:25px;
    border-radius:16px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
}

input, select, button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:10px;
    border:1px solid #ccc;
    font-size:16px;
    box-sizing:border-box;
}

button{
    background:#28a745;
    color:white;
    border:none;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#218838;
}

#status{
    margin-top:12px;
    text-align:center;
    font-weight:bold;
    white-space:pre-wrap;
}
</style>
</head>

<body>

<div class="container">

<h1>Book Service</h1>

<form id="bookingForm">

<input id="name" placeholder="Name" required>
<input id="address" placeholder="Address" required>
<input id="cans" type="number" min="1" placeholder="Number of Cans" required>

<select id="date" required>
    <option value="">Select Date</option>
</select>

<select id="time" required>
    <option value="">Select Time</option>
</select>

<button type="submit">Book Now</button>

</form>

<div id="status"></div>

</div>

<script>

/* =========================
   CONFIG
========================= */

const AIRTABLE_TOKEN = "patC9MjLvk4JCDQ5Q.0c365a1d7382c9f7dea8d4750ed19c18b00484109709ff5cbf8ad31d8c5bb9db";
const BASE_ID = "appiSgF39h6jIasNa";
const TABLE_NAME = "Bookings";
const FORMSPREE_URL = "https://formspree.io/f/xpqbkvlr";

/* =========================
   ELEMENTS
========================= */

const form = document.getElementById("bookingForm");
const status = document.getElementById("status");

const nameInput = document.getElementById("name");
const addressInput = document.getElementById("address");
const cansInput = document.getElementById("cans");
const dateSelect = document.getElementById("date");
const timeSelect = document.getElementById("time");

/* =========================
   SUMMER RANGE DATES
   June 24 → August 6
========================= */

function loadDates(){

    const year = new Date().getFullYear();

    const start = new Date(year, 5, 24); // June = 5
    const end = new Date(year, 7, 6);    // August = 7

    dateSelect.innerHTML = `<option value="">Select Date</option>`;

    let date = new Date(start);

    while(date <= end){

        const day = date.getDay();

        // Wednesday = 3, Thursday = 4
        if(day === 3 || day === 4){

            let dayName = day === 3 ? "Wednesday" : "Thursday";

            let formatted =
                `${dayName} - ${date.getMonth()+1}/${date.getDate()}/${date.getFullYear()}`;

            let option = document.createElement("option");

            option.value = formatted;
            option.textContent = formatted;

            dateSelect.appendChild(option);
        }

        date.setDate(date.getDate() + 1);
    }
}

loadDates();

/* =========================
   TIMES
========================= */

dateSelect.addEventListener("change", async () => {

    timeSelect.innerHTML = `<option value="">Loading...</option>`;

    if(!dateSelect.value) return;

    let allTimes;

    if(dateSelect.value.includes("Thursday")){
        allTimes = ["8:00 AM","9:00 AM","10:00 AM"];
    } else {
        allTimes = ["12:00 PM","1:00 PM","2:00 PM","3:00 PM","4:00 PM"];
    }

    try{

        const res = await fetch(
            `https://api.airtable.com/v0/${BASE_ID}/${TABLE_NAME}`,
            {
                headers:{
                    "Authorization": `Bearer ${AIRTABLE_TOKEN}`
                }
            }
        );

        const data = await res.json();

        const bookedSlots = (data.records || [])
            .map(r => r.fields?.SlotKey)
            .filter(Boolean);

        timeSelect.innerHTML = `<option value="">Select Time</option>`;

        allTimes.forEach(time => {

            const slotKey = `${dateSelect.value}|${time}`;

            if(!bookedSlots.includes(slotKey)){

                let opt = document.createElement("option");
                opt.value = time;
                opt.textContent = time;
                timeSelect.appendChild(opt);
            }
        });

        if(timeSelect.options.length === 1){
            let opt = document.createElement("option");
            opt.textContent = "No Times Available";
            opt.disabled = true;
            timeSelect.appendChild(opt);
        }

    } catch(err){
        console.error(err);
        timeSelect.innerHTML = `<option value="">Error Loading Times</option>`;
    }
});

/* =========================
   SUBMIT
========================= */

form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const name = nameInput.value.trim();
    const address = addressInput.value.trim();
    const cans = Number(cansInput.value);
    const date = dateSelect.value;
    const time = timeSelect.value;

    if(!name || !address || !cans || !date || !time){
        status.style.color = "red";
        status.innerHTML = "Please fill in all fields.";
        return;
    }

    const slotKey = `${date}|${time}`;

    const bookingData = {
        Name: name,
        Address: address,
        Cans: cans,
        Date: date,
        Time: time,
        SlotKey: slotKey
    };

    try{

        const check = await fetch(
            `https://api.airtable.com/v0/${BASE_ID}/${TABLE_NAME}?filterByFormula={SlotKey}="${slotKey}"`,
            {
                headers:{
                    "Authorization": `Bearer ${AIRTABLE_TOKEN}`
                }
            }
        );

        const checkData = await check.json();

        if(checkData.records?.length > 0){
            status.style.color = "red";
            status.innerHTML = "Slot already booked.";
            return;
        }

        const save = await fetch(
            `https://api.airtable.com/v0/${BASE_ID}/${TABLE_NAME}`,
            {
                method:"POST",
                headers:{
                    "Authorization": `Bearer ${AIRTABLE_TOKEN}`,
                    "Content-Type":"application/json"
                },
                body: JSON.stringify({ fields: bookingData })
            }
        );

        const saveData = await save.json();

        if(!save.ok){
            status.style.color = "red";
            status.innerHTML = "Airtable Error: " + JSON.stringify(saveData);
            return;
        }

        await fetch(FORMSPREE_URL,{
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body: JSON.stringify(bookingData)
        });

        status.style.color = "green";
        status.innerHTML = "✅ Booking Confirmed!";

        form.reset();
        timeSelect.innerHTML = `<option value="">Select Time</option>`;

    } catch(err){
        console.error(err);
        status.style.color = "red";
        status.innerHTML = "Network Error";
    }
});

</script>

</body>
</html>
