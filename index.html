<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Booking System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  background: #f4f4f4;
  margin: 0;
}

.container {
  max-width: 500px;
  margin: 30px auto;
  background: white;
  padding: 20px;
  border-radius: 10px;
}

input, select, button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
}

button {
  background: green;
  color: white;
  border: none;
  cursor: pointer;
}

button:hover { background: darkgreen; }

.admin-btn {
  background: black;
  margin-top: 15px;
}

#adminPanel {
  display: none;
  margin-top: 20px;
  border-top: 2px solid #ddd;
  padding-top: 15px;
}

.booking-item {
  background: #eee;
  padding: 10px;
  margin-top: 10px;
  border-radius: 5px;
}

.delete-btn {
  background: red;
  margin-top: 5px;
}

#deleteAllBtn {
  display: none;
  background: darkred;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">
  <h2>Book a Service</h2>

  <input id="name" placeholder="Full Name">
  <input id="address" placeholder="Address">

  <input type="date" id="date">

  <select id="time">
    <option>9:00 AM</option>
    <option>10:00 AM</option>
    <option>11:00 AM</option>
    <option>1:00 PM</option>
    <option>2:00 PM</option>
    <option>3:00 PM</option>
  </select>

  <button onclick="book()">Book Now</button>

  <div id="msg"></div>

  <button class="admin-btn" onclick="showAdmin()">Admin Panel</button>

  <div id="adminPanel">
    <h3>Admin Panel</h3>

    <div id="adminLoginBox">
      <input type="password" id="adminPass" placeholder="Enter Admin Password">
      <button onclick="checkAdmin()">Login</button>
    </div>

    <button id="deleteAllBtn" onclick="deleteAll()">Delete All Bookings</button>

    <div id="adminList"></div>
  </div>
</div>

<script>
let bookings = JSON.parse(localStorage.getItem("bookings")) || {};
let adminUnlocked = false;

function book() {
  const name = document.getElementById("name").value.trim();
  const address = document.getElementById("address").value.trim();
  const date = document.getElementById("date").value;
  const time = document.getElementById("time").value;
  const msg = document.getElementById("msg");

  if (!name || !address || !date || !time) {
    msg.innerText = "Fill out all fields.";
    msg.style.color = "red";
    return;
  }

  const [y, m, d] = date.split("-").map(Number);
  const dateObj = new Date(y, m - 1, d);

  if (dateObj.getDay() !== 3) {
    msg.innerText = "Only Wednesdays allowed.";
    msg.style.color = "red";
    return;
  }

  const key = date + "_" + time;

  if (bookings[key]) {
    msg.innerText = "This slot is already booked!";
    msg.style.color = "red";
    return;
  }

  bookings[key] = { name, address, date, time };
  localStorage.setItem("bookings", JSON.stringify(bookings));

  msg.innerText = "Booking successful!";
  msg.style.color = "green";
}

function showAdmin() {
  document.getElementById("adminPanel").style.display = "block";
}

function checkAdmin() {
  const pass = document.getElementById("adminPass").value;

  if (pass !== "Charles2013") {
    alert("Wrong password!");
    return;
  }

  adminUnlocked = true;

  document.getElementById("adminLoginBox").style.display = "none";
  document.getElementById("deleteAllBtn").style.display = "block";

  renderAdmin();
}

function renderAdmin() {
  if (!adminUnlocked) return;

  const list = document.getElementById("adminList");
  list.innerHTML = "<h4>All Bookings</h4>";

  const keys = Object.keys(bookings);

  if (keys.length === 0) {
    list.innerHTML += "<p>No bookings yet</p>";
    return;
  }

  keys.forEach((key) => {
    const b = bookings[key];

    const div = document.createElement("div");
    div.className = "booking-item";

    div.innerHTML = `
      <b>${b.date} - ${b.time}</b><br>
      ${b.name}<br>
      ${b.address}<br>
      <button class="delete-btn" onclick="deleteBooking('${key}')">Delete</button>
    `;

    list.appendChild(div);
  });
}

function deleteBooking(key) {
  if (!confirm("Delete this booking?")) return;

  delete bookings[key];
  localStorage.setItem("bookings", JSON.stringify(bookings));
  renderAdmin();
}

function deleteAll() {
  if (!confirm("DELETE ALL BOOKINGS? This cannot be undone.")) return;

  // 🔥 FULL RESET (FIXED)
  bookings = {};
  localStorage.removeItem("bookings");

  renderAdmin();
}
</script>

</body>
</html>
