<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trash Can Cleaning Service</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:#f4f4f4;
}

header{
  background:#2e7d32;
  color:white;
  text-align:center;
  padding:40px;
}

section{
  max-width:850px;
  margin:20px auto;
  background:white;
  padding:25px;
  border-radius:15px;
}

h2{color:#2e7d32;}

input, textarea{
  width:100%;
  padding:14px;
  margin:8px 0;
  border-radius:10px;
  border:2px solid #ddd;
}

button{
  background:#2e7d32;
  color:white;
  padding:15px;
  border:none;
  border-radius:10px;
  font-size:18px;
  cursor:pointer;
}

button:hover{
  background:#256628;
}

.note{
  background:#e8f5e9;
  padding:10px;
  border-radius:10px;
  font-weight:bold;
}

#completeScreen{
  display:none;
  position:fixed;
  inset:0;
  background:#2e7d32;
  color:white;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  font-size:26px;
  z-index:9999;
}

#completeScreen button{
  margin-top:20px;
  background:white;
  color:#2e7d32;
}

</style>
</head>

<body>

<header>
<h1>🗑️ Trash Can Cleaning</h1>
</header>

<section>

<h2>About</h2>
<p>Professional trash can cleaning service.</p>

</section>

<section>

<h2>Pricing</h2>
<p><b>$15 per can</b></p>
<p><b>2 cans for $25</b></p>

</section>

<section>

<h2>Book a Cleaning</h2>

<div class="note">
ONLY Wednesdays available — times auto-block when booked
</div>

<form id="form">

<input id="name" placeholder="Name" required>
<input id="address" placeholder="Address" required>
<input id="cans" type="number" placeholder="Cans" required>

<input id="date" type="date" required>
<input id="time" type="time" required>

<textarea id="notes" placeholder="Notes"></textarea>

<button type="submit">Book Now</button>

</form>

</section>

<div id="completeScreen">
  <div>✅ Booking Complete!<br><br>Can’t wait to see you!</div>
  <button onclick="closeScreen()">Done</button>
</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔴 PUT YOUR FIREBASE CONFIG HERE
const firebaseConfig = YOUR_FIREBASE_CONFIG;

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const form = document.getElementById("form");
const screen = document.getElementById("completeScreen");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const name = document.getElementById("name").value;
  const address = document.getElementById("address").value;
  const cans = document.getElementById("cans").value;
  const date = document.getElementById("date").value;
  const time = document.getElementById("time").value;
  const notes = document.getElementById("notes").value;

  const day = new Date(date + "T00:00:00").getDay();

  // ONLY WEDNESDAY
  if(day !== 3){
    alert("Only Wednesdays are available.");
    return;
  }

  const slotId = `${date}_${time}`;
  const slotRef = doc(db, "bookings", slotId);
  const snap = await getDoc(slotRef);

  // BLOCK if already booked
  if(snap.exists()){
    alert("That time is already booked. Pick another.");
    return;
  }

  // SAVE booking
  await setDoc(slotRef, {
    name,
    address,
    cans,
    date,
    time,
    notes
  });

  form.reset();
  screen.style.display = "flex";

});

function closeScreen(){
  screen.style.display = "none";
}

</script>

</body>
</html>
